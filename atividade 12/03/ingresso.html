<header>

    <nav>

<main>

<h2>Quero Assistir!</h2>
<p>Preencha o formulário abaixo para realizar o pré-cadastro para compra de ingressos.</p>

<form>

    <p>
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required>
    </p>

    <p>
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required>
    </p>

    <p>
        <label for="selecao">Seleção que você torce:</label><br>
        <select id="selecao" name="selecao">
            <option>Brasil</option>
            <option>Argentina</option>
            <option>França</option>
            <option>Alemanha</option>
            <option>Portugal</option>
        </select>
    </p>

    <p>
        <label for="quantidade">Quantidade de ingressos:</label><br>
        <input type="number" id="quantidade" name="quantidade" min="1" max="10">
    </p>

    <p>
        <input type="submit" value="Enviar Pré-Cadastro">
    </p>

</form>

</main>

<footer>
    <p>2026 Portal da Copa</p>
    <p><a href="https://www.fifa.com">Site oficial da FIFA</a></p>
   
</footer>

</body>
